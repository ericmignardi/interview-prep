<!DOCTYPE html>
<!--
  CSS Challenge 04 — Semantic & Accessible Form

  Task: Style this registration form so it looks clean and is fully accessible.
  The HTML is already correct semantically — your job is CSS + a11y verification.

  A11y checklist (these should already pass — verify you haven't broken them):
  ✅ Every input has an associated <label> (via `for`/`id`)
  ✅ Required fields are marked with `required` and visually indicated
  ✅ Error messages use `role="alert"` so screen readers announce them
  ✅ The fieldset groups related inputs with a <legend>
  ✅ Focus styles are visible (do NOT use `outline: none` without a replacement)
  ✅ Color is not the only way information is conveyed (don't rely on red alone)

  CSS task:
  1. Style the form to look like a real sign-up page (card, inputs full-width,
     proper spacing, a styled submit button)
  2. Show the .error message in red with an icon or border — but also add an
     icon or text (not just color) so it's accessible to colorblind users
  3. Add a visible :focus style to inputs (outline, ring, border change — your call)
  4. Style the required asterisk (*)

  Stretch: add a CSS-only password strength indicator using sibling selectors
  and :valid/:invalid pseudo-classes.

  Open in browser. Tab through all fields and verify focus is always visible.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>04 — Semantic Form</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .form-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 2.5rem;
      width: 100%;
      max-width: 480px;
    }

    .form-card h1 {
      font-size: 1.5rem;
      margin-bottom: 0.25rem;
      color: #1a1a2e;
    }

    .required-note {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 1.5rem;
    }

    fieldset {
      border: none;
      margin-bottom: 1.5rem;
    }

    legend {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 1rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
      margin-bottom: 1.25rem;
    }

    label {
      font-size: 0.875rem;
      font-weight: 600;
      color: #333;
    }

    .req {
      color: #c0392b;
      margin-left: 2px;
    }

    input {
      width: 100%;
      padding: 0.625rem 0.75rem;
      border: 1.5px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.9rem;
      color: #1a1a2e;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    /* Visible focus ring — never remove focus without replacing it */
    input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }

    .hint {
      font-size: 0.78rem;
      color: #888;
    }

    /* Error: color + icon (⚠) — not color alone */
    .error {
      font-size: 0.8rem;
      color: #c0392b;
      background: #fef2f2;
      border-left: 3px solid #c0392b;
      padding: 0.4rem 0.6rem;
      border-radius: 0 4px 4px 0;
    }

    .error[hidden] { display: none; }

    button[type="submit"] {
      width: 100%;
      padding: 0.75rem;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.5rem;
    }

    button[type="submit"]:hover { background: #4338ca; }
    button[type="submit"]:focus-visible {
      outline: 3px solid #4f46e5;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="form-card">
    <h1>Create account</h1>
    <p class="required-note"><span aria-hidden="true">*</span> Required field</p>

    <form novalidate>
      <fieldset>
        <legend>Personal info</legend>

        <div class="field">
          <label for="name">Full name <span aria-hidden="true" class="req">*</span></label>
          <input id="name" type="text" name="name" required autocomplete="name"
                 aria-describedby="name-error" />
          <p id="name-error" class="error" role="alert" hidden>
            ⚠ Please enter your full name.
          </p>
        </div>

        <div class="field">
          <label for="email">Email address <span aria-hidden="true" class="req">*</span></label>
          <input id="email" type="email" name="email" required autocomplete="email"
                 aria-describedby="email-error" />
          <p id="email-error" class="error" role="alert" hidden>
            ⚠ Please enter a valid email address.
          </p>
        </div>
      </fieldset>

      <fieldset>
        <legend>Security</legend>

        <div class="field">
          <label for="password">Password <span aria-hidden="true" class="req">*</span></label>
          <input id="password" type="password" name="password" required
                 aria-describedby="password-hint password-error"
                 minlength="8" />
          <p id="password-hint" class="hint">Must be at least 8 characters.</p>
          <p id="password-error" class="error" role="alert" hidden>
            ⚠ Password must be at least 8 characters.
          </p>
        </div>
      </fieldset>

      <button type="submit">Create account</button>
    </form>
  </div>
</body>
</html>
